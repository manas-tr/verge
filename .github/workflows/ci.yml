name: Verge CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install fastapi
          pip install uvicorn
          pip install pandas
          pip install numpy
          pip install scikit-learn
          pip install xgboost
          pip install mlflow
          pip install prefect
          pip install joblib

      - name: Verify Python Imports
        run: |
          python -c "import src.app.main"
          python -c "import src.pipeline.flow"

      - name: Build Docker Image
        run: |
          docker build -t verge .
