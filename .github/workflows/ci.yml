name: CarbonPilot CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install fastapi
          pip install uvicorn
          pip install pandas
          pip install numpy
          pip install scikit-learn
          pip install xgboost
          pip install mlflow
          pip install prefect
          pip install joblib

      - name: Verify Training Script
        run: |
          python -m py_compile src/models/train_model.py

      - name: Verify FastAPI App
        run: |
          python -m py_compile src/app/main.py

      - name: Verify Prefect Flow
        run: |
          python -m py_compile src/pipeline/flow.py

      - name: Build Docker Image
        run: |
          docker build -t carbonpilot .